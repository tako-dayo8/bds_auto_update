# .github/workflows/mirror-to-gitlab.yml
name: Mirror to GitLab
on: [push, delete]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 全履歴が必要
      - run: |
          git push --mirror "https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/mukoudakota/bds_auto_update.git"